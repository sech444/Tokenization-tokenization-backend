# =============================================================================
# FOUNDRY CONFIGURATION (foundry.toml)
# =============================================================================

[rpc_endpoints]
amoy = "https://polygon-amoy.g.alchemy.com/v2/${ALCHEMY_KEY}"
polygon_mumbai = "${POLYGON_RPC_URL}"
polygon_mainnet = "${POLYGON_MAINNET_RPC_URL}"

[profile.default]
remappings = [
    "@openzeppelin/contracts-upgradeable/=node_modules/@openzeppelin/contracts-upgradeable/",
    "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/"
]
src = "contracts"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = true
solc_version = "0.8.22"

[profile.ci]
fuzz = { runs = 10_000 }
invariant = { runs = 1_000 }

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true

